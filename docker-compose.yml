name: my-dashboard-app

services:
  # ─── MySQL 8.4 (shared instance, separate databases) ──────
  mysql:
    image: mysql:8.4
    container_name: mydashboard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-root_secret}",
          "--silent",
        ]
      interval: 5s
      timeout: 5s
      start_period: 60s
      retries: 30
    networks:
      - mydashboard

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mydashboard-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - mydashboard

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mydashboard-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - mydashboard

  # ─── Auth Service (PHP-FPM) ───────────────────────────────
  auth-php:
    build:
      context: ../my-dashboard-backend/auth-service
      dockerfile: Dockerfile
    container_name: mydashboard-auth-php
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${AUTH_APP_SECRET:-auth_secret_change_me}
      DATABASE_URL: "mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-secret}@mysql:3306/auth?serverVersion=8.4&charset=utf8mb4"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-mydashboard_jwt_pass}
      JWT_TOKEN_TTL: "3600"
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$$"
      NOTIFICATION_SERVICE_URL: "http://nginx"
      INTERNAL_NOTIFICATION_TOKEN: ${INTERNAL_NOTIFICATION_TOKEN:-internal_notification_token_change_me}
      MESSENGER_TRANSPORT_DSN: "amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/%2f/messages"
    volumes:
      - ../my-dashboard-backend/auth-service:/app
      - ../my-dashboard-backend/shared-bundle:/shared-bundle
      - auth_vendor:/app/vendor
      - jwt_keys:/app/config/jwt
    networks:
      - mydashboard

  # ─── Dashboard Service (PHP-FPM) ──────────────────────────
  dashboard-php:
    build:
      context: ../my-dashboard-backend/dashboard-service
      dockerfile: Dockerfile
    container_name: mydashboard-dashboard-php
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      auth-php:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${DASHBOARD_APP_SECRET:-dashboard_secret_change_me}
      DATABASE_URL: "mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-secret}@mysql:3306/dashboard?serverVersion=8.4&charset=utf8mb4"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-mydashboard_jwt_pass}
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$$"
      AUTH_SERVICE_URL: "http://auth-php:9000"
    volumes:
      - ../my-dashboard-backend/dashboard-service:/app
      - ../my-dashboard-backend/shared-bundle:/shared-bundle
      - dashboard_vendor:/app/vendor
      - jwt_keys:/app/config/jwt:ro
    networks:
      - mydashboard

  # ─── Events Service (PHP-FPM) ──────────────────────────────
  events-php:
    build:
      context: ../my-dashboard-backend/events-service
      dockerfile: Dockerfile
    container_name: mydashboard-events-php
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      auth-php:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${EVENTS_APP_SECRET:-events_secret_change_me}
      DATABASE_URL: "mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-secret}@mysql:3306/events?serverVersion=8.4&charset=utf8mb4"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-mydashboard_jwt_pass}
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$$"
      AUTH_SERVICE_URL: "http://auth-php:9000"
    volumes:
      - ../my-dashboard-backend/events-service:/app
      - ../my-dashboard-backend/shared-bundle:/shared-bundle
      - events_vendor:/app/vendor
      - jwt_keys:/app/config/jwt:ro
    networks:
      - mydashboard

  # ─── Notification Service (PHP-FPM) ───────────────────────
  notification-php:
    build:
      context: ../my-dashboard-backend/notification-service
      dockerfile: Dockerfile
    container_name: mydashboard-notification-php
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      auth-php:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${NOTIFICATION_APP_SECRET:-notification_secret_change_me}
      DATABASE_URL: "mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-secret}@mysql:3306/notifications?serverVersion=8.4&charset=utf8mb4"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-mydashboard_jwt_pass}
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$$"
      INTERNAL_NOTIFICATION_TOKEN: ${INTERNAL_NOTIFICATION_TOKEN:-internal_notification_token_change_me}
      MESSENGER_TRANSPORT_DSN: "amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/%2f/messages"
    volumes:
      - ../my-dashboard-backend/notification-service:/app
      - ../my-dashboard-backend/shared-bundle:/shared-bundle
      - notification_vendor:/app/vendor
      - jwt_keys:/app/config/jwt:ro
    networks:
      - mydashboard

  notification-worker:
    build:
      context: ../my-dashboard-backend/notification-service
      dockerfile: Dockerfile
    container_name: mydashboard-notification-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      notification-php:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${NOTIFICATION_APP_SECRET:-notification_secret_change_me}
      DATABASE_URL: "mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-secret}@mysql:3306/notifications?serverVersion=8.4&charset=utf8mb4"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-mydashboard_jwt_pass}
      CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$$"
      INTERNAL_NOTIFICATION_TOKEN: ${INTERNAL_NOTIFICATION_TOKEN:-internal_notification_token_change_me}
      MESSENGER_TRANSPORT_DSN: "amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/%2f/messages"
    command:
      [
        "php",
        "bin/console",
        "messenger:consume",
        "async",
        "--time-limit=3600",
        "--memory-limit=128M",
        "--no-interaction",
      ]
    volumes:
      - ../my-dashboard-backend/notification-service:/app
      - ../my-dashboard-backend/shared-bundle:/shared-bundle
      - notification_vendor:/app/vendor
      - jwt_keys:/app/config/jwt:ro
    networks:
      - mydashboard

  # ─── Nginx (API Gateway) ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: mydashboard-nginx
    restart: unless-stopped
    depends_on:
      - auth-php
      - dashboard-php
      - events-php
      - notification-php
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mydashboard

  # ─── Frontend (Vite dev) ──────────────────────────────────
  frontend:
    build:
      context: ../my-dashboard-frontend
      dockerfile: Dockerfile
    container_name: mydashboard-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../my-dashboard-frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8081/api
      VITE_PROXY_TARGET: "http://nginx:80"
    networks:
      - mydashboard

volumes:
  mysql_data:
  auth_vendor:
  dashboard_vendor:
  events_vendor:
  jwt_keys:
  frontend_node_modules:
  notification_vendor:

networks:
  mydashboard:
    driver: bridge
