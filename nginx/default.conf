# ─── API Gateway ─────────────────────────────────────────────
# Routes requests to the appropriate microservice based on URL path.
# Wildcard subdomain: <subdomain>.mydashboard.local (dev) or
#                     <subdomain>.mydashboard.com  (prod)
#
#   /auth/*                  → auth-php    (auth-service)
#   /events/*                → events-php  (events-service)
#   /notification/*          → notification-php (notification-service)
#   /dashboard/*             → dashboard-php (dashboard-service)
#   /translation/*           → translation-php (translation-service)
#   everything else          → frontend    (Vite dev server / static build)

upstream auth_backend {
    server auth-php:9000;
}

upstream events_backend {
    server events-php:9000;
}

upstream notification_backend {
    server notification-php:9000;
}

upstream dashboard_backend {
    server dashboard-php:9000;
}

upstream translation_backend {
    server translation-php:9000;
}

# ── Shared FastCGI snippet ────────────────────────────────
# Included in every backend location to avoid repetition.
map $host $x_subdomain {
    ~^(?<sub>[a-z0-9-]+)\.mydashboard\.(local|com)$  $sub;
    default                                            "";
}

server {
    listen 80;
    server_name ~^(?<subdomain>[a-z0-9-]+)\.mydashboard\.(local|com)$
                app.mydashboard.local
                localhost;

    # Use Docker's internal DNS so nginx resolves upstreams per-request,
    # not at startup — allows nginx to start even if frontend isn't running.
    resolver 127.0.0.11 valid=30s;

    # ── Dedicated service health endpoints ────────────────────
    location = /auth/health {
        fastcgi_pass auth_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param HTTP_X_SUBDOMAIN $x_subdomain;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    location = /events/health {
        fastcgi_pass events_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param HTTP_X_SUBDOMAIN $x_subdomain;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    location = /notification/health {
        fastcgi_pass notification_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param HTTP_X_SUBDOMAIN $x_subdomain;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Events-service routes ─────────────────────────────────
    location ^~ /events {
        fastcgi_pass events_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param HTTP_X_SUBDOMAIN $x_subdomain;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Auth-service routes ──────────────────────────────────
    location ^~ /auth {
        fastcgi_pass auth_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param HTTP_X_SUBDOMAIN $x_subdomain;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Notification-service routes ───────────────────────────
    location ^~ /notification {
        fastcgi_pass notification_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param HTTP_X_SUBDOMAIN $x_subdomain;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Dashboard-service routes (todos, shopping-lists, health) ─
    location ^~ /dashboard/ {
        fastcgi_pass dashboard_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param HTTP_X_SUBDOMAIN $x_subdomain;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Translation-service routes ────────────────────────────
    location ^~ /translation {
        fastcgi_pass translation_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param HTTP_X_SUBDOMAIN $x_subdomain;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Reject legacy /api/ prefix (prevents Vite SPA fallback confusion) ──
    location ^~ /api/ {
        return 404;
    }

    # ── Frontend (Vite dev / static build) ────────────────────
    # Use a variable so nginx resolves 'frontend' lazily (per-request via
    # Docker DNS), not eagerly at startup when the container may not exist.
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
