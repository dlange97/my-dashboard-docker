# ─── API Gateway ─────────────────────────────────────────────
# Routes requests to the appropriate microservice based on URL path.
#
#   /auth/*                  → auth-php    (auth-service)
#   /events/*                → events-php  (events-service)
#   /notification/*          → notification-php (notification-service)
#   /dashboard/*             → dashboard-php (dashboard-service)

upstream auth_backend {
    server auth-php:9000;
}

upstream events_backend {
    server events-php:9000;
}

upstream notification_backend {
    server notification-php:9000;
}

upstream dashboard_backend {
    server dashboard-php:9000;
}

upstream translation_backend {
    server translation-php:9000;
}

server {
    listen 80;
    server_name _;

    # ── Dedicated service health endpoints ────────────────────
    location = /auth/health {
        fastcgi_pass auth_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
            fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    location = /events/health {
        fastcgi_pass events_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
            fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    location = /notification/health {
        fastcgi_pass notification_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
            fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Events-service routes ─────────────────────────────────
    location ^~ /events {
        fastcgi_pass events_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Auth-service routes ──────────────────────────────────
    location ^~ /auth {
        fastcgi_pass auth_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Notification-service routes ───────────────────────────
    location ^~ /notification {
        fastcgi_pass notification_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Dashboard-service routes (todos, shopping-lists, health) ─
    location ^~ /dashboard/ {
        fastcgi_pass dashboard_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Translation-service routes ────────────────────────────
    location ^~ /translation {
        fastcgi_pass translation_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /app/public;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── Fallback ─────────────────────────────────────────────
    location / {
        return 404;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
